// === Canvas drawing ===
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw(w, h);
}
window.addEventListener('resize', resize);

let nodeHits = [];  // {x, y, r, route, node}

function drawBackground(w, h) {
  const g = ctx.createRadialGradient(w*0.5, h*0.35, 0, w*0.5, h*0.5, w*0.8);
  g.addColorStop(0, PALETTE.bg1);
  g.addColorStop(1, PALETTE.bg0);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = 'rgba(180,200,255,0.35)';
  for (let i = 0; i < 80; i++) {
    const x = (i * 9301 + 49297) % w;
    const y = (i * 233280 + 7919) % h;
    const r = ((i * 31) % 7) / 10 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawTitle(w) {
  ctx.textAlign = 'left';
  ctx.fillStyle = PALETTE.text;
  ctx.font = '600 32px "SF Pro Display", -apple-system, sans-serif';
  ctx.fillText('LUMEN  ATELIER', 60, 60);

  ctx.fillStyle = PALETTE.textDim;
  ctx.font = '400 13px "SF Mono", monospace';
  ctx.fillText('— 光之工坊 · 90 天 AI Infra 领跑路线图', 60, 82);

  ctx.textAlign = 'right';
  ctx.fillStyle = PALETTE.textFaint;
  ctx.font = '400 11px "SF Mono", monospace';
  const iso = new Date().toISOString().slice(0,10);
  ctx.fillText(`START · ${iso}`, w - 60, 60);
  ctx.fillText('M5 PRO · 18C · 20G · 24GB · 2TB', w - 60, 78);
}

function drawTimelineHeader(w, x0, x1, yTop) {
  const usable = x1 - x0;
  const monthColors = ['rgba(0,217,255,0.04)','rgba(255,184,77,0.04)','rgba(255,110,199,0.04)'];
  for (let m = 0; m < 3; m++) {
    const mx = x0 + (usable * m / 3);
    const mw = usable / 3;
    ctx.fillStyle = monthColors[m];
    ctx.fillRect(mx, yTop, mw, 4);

    ctx.fillStyle = PALETTE.textDim;
    ctx.font = '600 12px "SF Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`MONTH ${m+1}`, mx + 12, yTop - 10);

    ctx.fillStyle = PALETTE.textFaint;
    ctx.font = '400 10px "SF Mono", monospace';
    const labels = ['Foundations · 打基本功', 'Internals · 深入内核', 'Output · 输出 & 上榜'];
    ctx.fillText(labels[m], mx + 12, yTop + 22);
  }

  ctx.strokeStyle = PALETTE.grid;
  ctx.lineWidth = 1;
  for (let wk = 0; wk <= 12; wk++) {
    const tx = x0 + (usable * wk / 12);
    ctx.beginPath();
    ctx.moveTo(tx, yTop + 8);
    ctx.lineTo(tx, yTop + 14);
    ctx.stroke();
    if (wk % 2 === 0) {
      ctx.fillStyle = PALETTE.textFaint;
      ctx.font = '400 9px "SF Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`W${wk}`, tx, yTop + 26);
    }
  }
}

function drawRoute(route, x0, x1, yCenter) {
  const usable = x1 - x0;

  // spine
  const spineGrad = ctx.createLinearGradient(x0, yCenter, x1, yCenter);
  spineGrad.addColorStop(0, 'rgba(42,48,80,0.2)');
  spineGrad.addColorStop(0.5, route.color);
  spineGrad.addColorStop(1, 'rgba(42,48,80,0.2)');
  ctx.strokeStyle = spineGrad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x0, yCenter);
  ctx.lineTo(x1, yCenter);
  ctx.stroke();

  ctx.textAlign = 'right';
  ctx.fillStyle = route.color;
  ctx.font = '600 22px "SF Pro Display", -apple-system, sans-serif';
  ctx.fillText(route.name, x0 - 24, yCenter + 6);
  ctx.fillStyle = PALETTE.textDim;
  ctx.font = '500 10px "SF Mono", monospace';
  ctx.fillText(route.en, x0 - 24, yCenter - 16);
  ctx.fillStyle = PALETTE.textFaint;
  ctx.font = '400 11px -apple-system, sans-serif';
  ctx.fillText(route.sub, x0 - 24, yCenter + 24);

  route.nodes.forEach((node, i) => {
    const nx = x0 + (usable * node.week / 12);
    const ny = yCenter;
    const isHover = hoverNode && hoverNode.node === node;

    const glowR = isHover ? 32 : 24;
    const glow = ctx.createRadialGradient(nx, ny, 0, nx, ny, glowR);
    glow.addColorStop(0, route.color + (isHover ? 'ee' : 'cc'));
    glow.addColorStop(0.4, route.color + '33');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(nx, ny, glowR, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = route.color;
    ctx.lineWidth = isHover ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.arc(nx, ny, isHover ? 11 : 9, 0, Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = route.color;
    ctx.beginPath();
    ctx.arc(nx, ny, isHover ? 5.5 : 4.5, 0, Math.PI*2);
    ctx.fill();

    nodeHits.push({ x: nx, y: ny, r: 18, route, node });

    const above = (i % 2 === 0);

    ctx.font = '400 10px -apple-system, sans-serif';
    const maxW = 190;
    const words = node.detail.split(' · ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' · ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);

    const lineH = 12;
    const titleGap = 16;
    const nodeGap = 24;
    const connectorPad = 4;

    let titleY, firstDetailY, connectorStartY, connectorEndY, weeksY;
    if (above) {
      const lastDetailY = ny - nodeGap;
      firstDetailY = lastDetailY - (lines.length - 1) * lineH;
      titleY = firstDetailY - titleGap;
      weeksY = titleY - 14;
      connectorStartY = ny - 10;
      connectorEndY = lastDetailY + connectorPad;
    } else {
      weeksY = ny + nodeGap;
      titleY = weeksY + 16;
      firstDetailY = titleY + 14;
      connectorStartY = ny + 10;
      connectorEndY = weeksY - 6;
    }

    ctx.strokeStyle = route.color + '55';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(nx, connectorStartY);
    ctx.lineTo(nx, connectorEndY);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = route.color + 'cc';
    ctx.font = '500 9px "SF Mono", monospace';
    ctx.fillText(node.weeks, nx, weeksY);

    ctx.fillStyle = PALETTE.text;
    ctx.font = '600 12px -apple-system, sans-serif';
    ctx.fillText(node.title, nx, titleY);

    ctx.fillStyle = PALETTE.textFaint;
    ctx.font = '400 10px -apple-system, sans-serif';
    lines.forEach((ln, li) => {
      ctx.fillText(ln, nx, firstDetailY + li * lineH);
    });
  });
}

function drawFooter(w, h) {
  const fy = h - 110;
  ctx.strokeStyle = 'rgba(120,140,200,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, fy); ctx.lineTo(w - 60, fy);
  ctx.stroke();

  const principles = [
    { tag: '01', t: '读代码 > 看视频', d: 'vLLM / MLX 源码即教材 · 一周一个模块' },
    { tag: '02', t: '本地实验 + 云补完', d: 'Mac 跑 7B 找手感 · A100 跑真实负载' },
    { tag: '03', t: '产出大于消化',    d: '博客 / PR / Benchmark · 公开才算完成' },
    { tag: '04', t: '差异化优先',      d: 'MLX 是别人没卷的赛道 · 优先占位' },
  ];
  const colW = (w - 120) / 4;
  principles.forEach((p, i) => {
    const px = 60 + colW * i;
    ctx.textAlign = 'left';
    ctx.fillStyle = PALETTE.textFaint;
    ctx.font = '500 11px "SF Mono", monospace';
    ctx.fillText(p.tag, px, fy + 28);
    ctx.fillStyle = PALETTE.text;
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.fillText(p.t, px, fy + 50);
    ctx.fillStyle = PALETTE.textDim;
    ctx.font = '400 11px -apple-system, sans-serif';
    ctx.fillText(p.d, px, fy + 70);
  });
}

let hoverNode = null;

function draw(w, h) {
  ctx.clearRect(0, 0, w, h);
  nodeHits = [];
  drawBackground(w, h);
  drawTitle(w);

  const x0 = 200;
  const x1 = w - 80;
  const yHeader = 130;
  drawTimelineHeader(w, x0, x1, yHeader);

  const lanesTop = 230;
  const lanesBottom = h - 160;
  const laneStep = (lanesBottom - lanesTop) / ROUTES.length;
  ROUTES.forEach((route, i) => {
    const yCenter = lanesTop + laneStep * i + laneStep / 2;
    drawRoute(route, x0, x1, yCenter);
  });

  drawFooter(w, h);
}

// === Interaction ===
function hitTest(mx, my) {
  for (const h of nodeHits) {
    const dx = mx - h.x, dy = my - h.y;
    if (dx*dx + dy*dy < h.r*h.r) return h;
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const hit = hitTest(e.clientX, e.clientY);
  const newHover = hit ? hit : null;
  if (newHover !== hoverNode) {
    hoverNode = newHover;
    canvas.classList.toggle('hot', !!hoverNode);
    draw(window.innerWidth, window.innerHeight);
  }
});

canvas.addEventListener('click', (e) => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) openPanel(hit.route, hit.node);
});

// === Panel ===
const panel = document.getElementById('panel');
const backdrop = document.getElementById('backdrop');

function openPanel(route, node) {
  panel.style.setProperty('--accent', route.color);
  document.getElementById('p-meta').textContent = `${node.weeks}  ·  ${route.en}`;
  document.getElementById('p-title').textContent = node.title;
  document.getElementById('p-sub').textContent = route.sub;

  const body = document.getElementById('p-body');
  body.innerHTML = '';
  body.appendChild(makeSection('学习目标', node.goals));
  body.appendChild(makeSection('必修知识点', node.knowledge));
  body.appendChild(makeReading('必读资料', node.reading));
  body.appendChild(makeExperiments('动手实验', node.experiments));
  body.appendChild(makeSection('交付物', [node.deliverable], 'deliver'));
  body.appendChild(makeSection('验收标准', [node.acceptance], 'accept'));

  panel.classList.add('open');
  backdrop.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  backdrop.classList.remove('open');
}

function makeSection(title, items, cls = '') {
  const s = document.createElement('div');
  s.className = 'section ' + cls;
  const h = document.createElement('h3'); h.textContent = title; s.appendChild(h);
  const ul = document.createElement('ul');
  items.forEach(it => {
    const li = document.createElement('li');
    li.textContent = it;
    ul.appendChild(li);
  });
  s.appendChild(ul);
  return s;
}

function makeReading(title, items) {
  const s = document.createElement('div');
  s.className = 'section reading';
  const h = document.createElement('h3'); h.textContent = title; s.appendChild(h);
  const ul = document.createElement('ul');
  items.forEach(it => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = it.url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = it.name;
    li.appendChild(a);
    ul.appendChild(li);
  });
  s.appendChild(ul);
  return s;
}

function makeExperiments(title, items) {
  return makeSection(title, items, 'exp');
}

document.getElementById('close').addEventListener('click', closePanel);
backdrop.addEventListener('click', closePanel);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
});

resize();
</script>
</body>
</html>
